resources:
  jobs:
    pl_shopflow_dbt_job:
      name: pl_shopflow_dbt_job
      tasks:
        - task_key: dbt_task_job
          dbt_task:
            project_directory: /Workspace/Users/deepak.subedi311@gmail.com/shopflow${workspace.root_path}/files/
            commands:
              - dbt deps
              - dbt seed
              - dbt snapshot
              - dbt run
              - dbt test
            schema: bronze
            warehouse_id: ${var.warehouse_id}
            catalog: workspace${var.catalog}
            source: WORKSPACE
          environment_key: dbt-default
      queue:
        enabled: true
      environments:
        - environment_key: dbt-default
          spec:
            dependencies:
              - dbt-databricks>=1.0.0,<2.0.0
            environment_version: "4"
      performance_target: PERFORMANCE_OPTIMIZED
